<!doctype html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width,initial-scale=1.0"> <title>College Path Finder</title> <style> body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f5f5fa;margin:0;padding:0;color:#222} .container{max-width:800px;margin:auto;padding:20px} h1{text-align:center;color:#4b4b9f;margin-bottom:10px} h2{text-align:center;color:#666;margin-bottom:30px;font-weight:400} .section{background:#fff;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 4px 10px rgba(0,0,0,.1)} .question{font-weight:600;margin-bottom:10px} .option{display:block;margin:6px 0;padding:10px 14px;border:1px solid #ccc;border-radius:8px;cursor:pointer;background:#fafafa} .option:hover{background:#e9e9ff} button{background:#4b4b9f;color:#fff;border:none;padding:12px 20px;border-radius:8px;font-size:15px;cursor:pointer;margin-top:10px} button:hover{background:#3a3a8f} .hidden{display:none} .result-card{background:#f9f9ff;border-left:4px solid #4b4b9f;padding:12px;margin-bottom:10px;border-radius:8px} .result-card h3{margin:0 0 6px 0;color:#333} .result-card p{margin:0;font-size:14px;color:#555} .planner{margin-top:20px} .year{margin-bottom:20px} .year h4{color:#4b4b9f;margin-bottom:8px} .course{background:#fff;border:1px solid #ddd;border-radius:6px;padding:8px;margin-bottom:6px} </style> </head> <body> <div class="container"> <h1>College Path Finder</h1> <h2>Discover your best-fit major and college plan</h2> <div id="quiz" class="section"></div> <div id="results" class="section hidden"></div> <div id="planner" class="section hidden"></div> </div> <script> // ---------- Simplified Data ---------- const QUESTIONS=[ {q:"What interests you most?",opts:["Technology","Medicine","Business","Art","Environment","Education"]}, {q:"Which subject do you enjoy most?",opts:["Math","Science","English","History","Art","Economics"]}, {q:"What type of college do you prefer?",opts:["Large public","Small private","Florida-based","Anywhere in U.S."]}, {q:"What motivates you most?",opts:["Innovation","Helping others","Leadership","Creativity","Research"]} ]; const COLLEGES=[ {name:"University of Florida",majors:["Technology","Business","Medicine"],loc:"Florida",type:"Public"}, {name:"Florida State University",majors:["Education","Business","Art"],loc:"Florida",type:"Public"}, {name:"University of Miami",majors:["Medicine","Business","Art"],loc:"Florida",type:"Private"}, {name:"Rollins College",majors:["Education","Art","Business"],loc:"Florida",type:"Private"}, {name:"Georgia Tech",majors:["Technology","Engineering"],loc:"Georgia",type:"Public"} ]; let answers=[],step=0; // ---------- Quiz ---------- function renderQuestion(){ if(step>=QUESTIONS.length){showResults();return;} const q=QUESTIONS[step]; document.getElementById("quiz").innerHTML=` <div class="question">${q.q}</div> ${q.opts.map(o=>`<div class="option" onclick="selectOption('${o}')">${o}</div>`).join("")} <p style="text-align:right;color:#888;font-size:13px;margin-top:10px;">Question ${step+1} of ${QUESTIONS.length}</p>`; } function selectOption(o){answers.push(o);step++;renderQuestion();} // ---------- Results ---------- function showResults(){ document.getElementById("quiz").classList.add("hidden"); const interest=answers[0]; const locationPref=answers[2].includes("Florida")?"Florida":"Anywhere"; const matched=COLLEGES.filter(c=>c.majors.includes(interest)&&(locationPref==="Anywhere"||c.loc==="Florida")).slice(0,5); document.getElementById("results").classList.remove("hidden"); document.getElementById("results").innerHTML=` <h3>🎓 Recommended Colleges</h3> ${matched.map(c=>`<div class="result-card"><h3>${c.name}</h3><p>${c.type} • ${c.loc}</p></div>`).join("")} <button onclick="showPlanner()">View 4‑Year Planner</button>`; } // ---------- Planner ---------- function showPlanner(){ document.getElementById("results").classList.add("hidden"); document.getElementById("planner").classList.remove("hidden"); document.getElementById("planner").innerHTML=` <h3>📅 4‑Year High School Planner</h3> <div class="planner"> <div class="year"><h4>9th Grade</h4><div class="course">English 9</div><div class="course">Algebra I</div><div class="course">Biology</div><div class="course">World History</div></div> <div class="year"><h4>10th Grade</h4><div class="course">English 10</div><div class="course">Geometry</div><div class="course">Chemistry</div><div class="course">Modern History</div></div> <div class="year"><h4>11th Grade</h4><div class="course">English 11 / AP Lang</div><div class="course">Pre‑Calculus</div><div class="course">Physics</div><div class="course">US History</div></div> <div class="year"><h4>12th Grade</h4><div class="course">English 12 / AP Lit</div><div class="course">Calculus or Statistics</div><div class="course">Science Elective</div><div class="course">Government & Economics</div></div> </div> <button onclick="restart()">Start Over</button>`; } function restart(){answers=[];step=0;document.getElementById("planner").classList.add("hidden");document.getElementById("quiz").classList.remove("hidden");renderQuestion();} renderQuestion(); </script> </body> </html>
